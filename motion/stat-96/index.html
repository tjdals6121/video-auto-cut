<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: transparent;
        font-family: 'Noto Sans KR', sans-serif;
      }
      #card {
        position: absolute;
        bottom: 60px;
        left: 80px;
        display: flex;
        align-items: center;
        background: rgba(10, 10, 10, 0.88);
        border-left: 6px solid #FFD700;
        padding: 28px 48px 28px 36px;
        clip-path: inset(0 100% 0 0);
      }
      #number {
        font-size: 112px;
        font-weight: 900;
        color: #FFD700;
        line-height: 1;
        margin-right: 32px;
        opacity: 0;
      }
      #text-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #label {
        font-size: 38px;
        font-weight: 700;
        color: #FFFFFF;
        opacity: 0;
      }
      #sublabel {
        font-size: 24px;
        font-weight: 400;
        color: rgba(255,255,255,0.65);
        opacity: 0;
      }
      #badge {
        position: absolute;
        top: -16px;
        left: 36px;
        background: #FFD700;
        color: #000;
        font-size: 16px;
        font-weight: 700;
        padding: 4px 14px;
        letter-spacing: 2px;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div id="badge">COMBAT PROVEN</div>
      <div id="number">96%</div>
      <div id="text-group">
        <div id="label">요격 성공률</div>
        <div id="sublabel">이란 → UAE 방공전 · 패트리엇·애로와 다층 방공</div>
      </div>
    </div>

    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="8"
      data-width="1920"
      data-height="1080"
    ></div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.to("#card", { clipPath: "inset(0 0% 0 0)", duration: 0.5, ease: "power3.out" }, 0.2);
      tl.fromTo("#number", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.7)" }, 0.4);
      tl.to("#label", { opacity: 1, duration: 0.3 }, 0.7);
      tl.to("#sublabel", { opacity: 1, duration: 0.3 }, 0.9);
      tl.to("#badge", { opacity: 1, duration: 0.3 }, 0.6);
      tl.to("#number", { scale: 1.05, duration: 0.15, yoyo: true, repeat: 1 }, 1.5);
      tl.to("#card", { x: -80, opacity: 0, duration: 0.6, ease: "power2.in" }, 6.8);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
